# XcodeGen spec — generates SwiftAndroidImdbDemo.xcodeproj from this YAML.
# Re-run `xcodegen generate` after editing.

name: SwiftAndroidImdbDemo
options:
  bundleIdPrefix: io.github.erikg84
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""   # set in Xcode if you want to run on a device
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    FRAMEWORK_SEARCH_PATHS: $(SRCROOT)/Frameworks

targets:
  SwiftAndroidImdbDemo:
    type: application
    platform: iOS
    sources:
      - SwiftAndroidImdbDemo
    info:
      path: SwiftAndroidImdbDemo/Info.plist
      properties:
        CFBundleDisplayName: SwiftAndroid IMDB
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.erikg84.SwiftAndroidImdbDemo
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - framework: Frameworks/SwiftAndroidSDK.xcframework
        embed: true

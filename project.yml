# XcodeGen spec — generates SwiftAndroidImdbDemo.xcodeproj from this YAML.
# Re-run `xcodegen generate` after editing.

name: SwiftAndroidImdbDemo
options:
  bundleIdPrefix: io.github.erikg84
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""   # set in Xcode if you want to run on a device
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# The SDK is the published wrapper repo — SPM downloads the XCFramework
# from a public GCS bucket on first resolve. No auth needed.
packages:
  SwiftAndroidSDK:
    url: https://github.com/erikg84/swift-android-idbm-sdk-spm
    from: "1.1.3"

targets:
  SwiftAndroidImdbDemo:
    type: application
    platform: iOS
    sources:
      - SwiftAndroidImdbDemo
    info:
      path: SwiftAndroidImdbDemo/Info.plist
      properties:
        CFBundleDisplayName: SwiftAndroid IMDB
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.erikg84.SwiftAndroidImdbDemo
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: SwiftAndroidSDK
        product: SwiftAndroidSDK

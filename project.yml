name: SwiftAndroidImdbDemo
options:
  bundleIdPrefix: io.github.erikg84
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

# SDK resolved via local Package.swift binaryTarget pointing at GCS.
# SPM downloads the XCFramework automatically — no manual copy needed.
packages:
  SwiftAndroidSDKPackage:
    path: .

targets:
  SwiftAndroidImdbDemo:
    type: application
    platform: iOS
    sources:
      - SwiftAndroidImdbDemo
    info:
      path: SwiftAndroidImdbDemo/Info.plist
      properties:
        CFBundleDisplayName: SwiftAndroid IMDB
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.erikg84.SwiftAndroidImdbDemo
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0.0"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: SwiftAndroidSDKPackage
        product: SwiftAndroidSDK
